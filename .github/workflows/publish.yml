name: Build And Publish

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Run pytest
    runs-on: macos-15
    env:
      UV_CACHE_DIR: .uv-cache
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install native build deps
        run: |
          brew update
          brew install meson ninja pkg-config

      - name: Resolve Swift stdlib path
        shell: bash
        run: |
          SWIFT_STDLIB_DIR=""
          for candidate in \
            "$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/macosx" \
            "/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/macosx"; do
            if [ -f "$candidate/libswift_Concurrency.dylib" ]; then
              SWIFT_STDLIB_DIR="$candidate"
              break
            fi
          done
          if [ -z "$SWIFT_STDLIB_DIR" ]; then
            SWIFT_LIB=$(find /Library/Developer/CommandLineTools /Applications -path '*/usr/lib/swift*/macosx/libswift_Concurrency.dylib' 2>/dev/null | head -n 1)
            if [ -n "$SWIFT_LIB" ]; then
              SWIFT_STDLIB_DIR="$(dirname "$SWIFT_LIB")"
            fi
          fi
          if [ -z "$SWIFT_STDLIB_DIR" ]; then
            echo "Unable to locate libswift_Concurrency.dylib" >&2
            exit 1
          fi
          echo "Resolved SWIFT_STDLIB_DIR=$SWIFT_STDLIB_DIR"
          echo "SWIFT_STDLIB_DIR=$SWIFT_STDLIB_DIR" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$SWIFT_STDLIB_DIR${DYLD_FALLBACK_LIBRARY_PATH:+:$DYLD_FALLBACK_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=-C link-arg=-L$SWIFT_STDLIB_DIR -C link-arg=-Wl,-rpath,$SWIFT_STDLIB_DIR ${RUSTFLAGS:-}" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          uv sync --group dev --no-install-project --no-install-workspace --no-install-package macloop --no-install-local
          .venv/bin/maturin develop --manifest-path python_ffi/Cargo.toml
          .venv/bin/pytest -q tests

      - name: Install Rust coverage tooling
        if: ${{ github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/') }}
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked

      - name: Generate Python coverage report
        if: ${{ github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/') }}
        run: |
          uv sync --group dev --no-install-project --no-install-workspace --no-install-package macloop --no-install-local
          .venv/bin/maturin develop --manifest-path python_ffi/Cargo.toml
          .venv/bin/pytest \
            --cov=macloop \
            --cov-report=xml:python-coverage.xml \
            --cov-report=term-missing \
            -q tests/test_public_api.py tests/test_runtime_helpers.py tests/test_e2e_synthetic.py

      - name: Generate Rust coverage report (lcov)
        if: ${{ github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/') }}
        shell: bash
        run: |
          SWIFT_RUSTFLAGS="$RUSTFLAGS"
          cargo llvm-cov clean --workspace
          source <(cargo llvm-cov show-env --export-prefix)
          export CARGO_TARGET_DIR="${CARGO_LLVM_COV_TARGET_DIR:-target/llvm-cov-target}"
          export RUSTFLAGS="$RUSTFLAGS $SWIFT_RUSTFLAGS"
          cargo llvm-cov --workspace --no-report
          .venv/bin/maturin develop --manifest-path python_ffi/Cargo.toml
          .venv/bin/pytest -q tests/test_e2e_synthetic.py tests/test_ffi_backend.py
          cargo llvm-cov report --lcov --output-path rust-lcov.info

      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/') }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: rust-lcov.info
          flags: rust
          disable_search: true
          fail_ci_if_error: false

      - name: Upload Python coverage to Codecov
        if: ${{ github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/') }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: python-coverage.xml
          flags: python
          disable_search: true
          fail_ci_if_error: false

  build:
    name: Build wheels and sdist
    needs: test
    runs-on: ${{ matrix.os }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            python-version: "3.11"
            target: aarch64-apple-darwin
          - os: macos-13
            python-version: "3.11"
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install maturin
        run: python -m pip install 'maturin>=1.0,<2.0'

      - name: Patch Cargo.toml version from tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [ "$VERSION" = "$TAG" ]; then
            echo "Tag must start with 'v', got: $TAG" >&2
            exit 1
          fi
          sed -i.bak -E "s/^version = \".*\"$/version = \"${VERSION}\"/" python_ffi/Cargo.toml
          rm -f python_ffi/Cargo.toml.bak
          grep -n '^version = ' python_ffi/Cargo.toml

      - name: Install native build deps
        run: |
          brew update
          brew install meson ninja pkg-config

      - name: Resolve Swift stdlib path
        shell: bash
        run: |
          SWIFT_STDLIB_DIR=""
          for candidate in \
            "$(xcode-select -p)/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/macosx" \
            "/Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/lib/swift/macosx"; do
            if [ -f "$candidate/libswift_Concurrency.dylib" ]; then
              SWIFT_STDLIB_DIR="$candidate"
              break
            fi
          done
          if [ -z "$SWIFT_STDLIB_DIR" ]; then
            SWIFT_LIB=$(find /Library/Developer/CommandLineTools /Applications -path '*/usr/lib/swift*/macosx/libswift_Concurrency.dylib' 2>/dev/null | head -n 1)
            if [ -n "$SWIFT_LIB" ]; then
              SWIFT_STDLIB_DIR="$(dirname "$SWIFT_LIB")"
            fi
          fi
          if [ -z "$SWIFT_STDLIB_DIR" ]; then
            echo "Unable to locate libswift_Concurrency.dylib" >&2
            exit 1
          fi
          echo "Resolved SWIFT_STDLIB_DIR=$SWIFT_STDLIB_DIR"
          echo "SWIFT_STDLIB_DIR=$SWIFT_STDLIB_DIR" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$SWIFT_STDLIB_DIR${DYLD_FALLBACK_LIBRARY_PATH:+:$DYLD_FALLBACK_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=-C link-arg=-L$SWIFT_STDLIB_DIR -C link-arg=-Wl,-rpath,$SWIFT_STDLIB_DIR ${RUSTFLAGS:-}" >> "$GITHUB_ENV"

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build wheel
        shell: bash
        run: |
          export PATH="$(dirname "$(rustup which cargo)"):$PATH"
          hash -r
          test -f "$SWIFT_STDLIB_DIR/libswift_Concurrency.dylib"
          which python
          python --version
          which cargo
          cargo -vV
          which rustc
          rustc -vV
          python -m maturin build --release --target ${{ matrix.target }} --out dist

      - name: Build sdist
        if: matrix.os == 'macos-15' && matrix.target == 'aarch64-apple-darwin'
        run: python -m maturin sdist --out dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.os }}-${{ matrix.target }}
          path: dist

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/macloop/
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
          verbose: true

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/macloop/
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          verbose: true
