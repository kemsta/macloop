          done

          echo "Resolved SWIFT_TARGET=$SWIFT_TARGET"
          echo "Resolved SWIFT_STDLIB_DIR=$SWIFT_STDLIB_DIR"
          echo "Resolved SWIFT_RUNTIME_RESOURCE_DIR=$SWIFT_RUNTIME_RESOURCE_DIR"
          printf 'Resolved Swift runtime search paths:\n'
          printf '  %s\n' "${SEARCH_PATHS[@]}"
          echo "SWIFT_TARGET=$SWIFT_TARGET" >> "$GITHUB_ENV"
          echo "SWIFT_STDLIB_DIR=$SWIFT_STDLIB_DIR" >> "$GITHUB_ENV"
          echo "SWIFT_RUNTIME_RESOURCE_DIR=$SWIFT_RUNTIME_RESOURCE_DIR" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$DYLD_SWIFT_PATHS${DYLD_FALLBACK_LIBRARY_PATH:+:$DYLD_FALLBACK_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=${SWIFT_RUSTFLAGS# } ${RUSTFLAGS:-}" >> "$GITHUB_ENV"

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build wheel
        shell: bash
        run: |
          export PATH="$(dirname "$(rustup which cargo)"):$PATH"
          hash -r
          test -f "$SWIFT_STDLIB_DIR/libswiftCore.dylib"
          which python
          python --version
          which cargo
          cargo -vV
          which rustc
          rustc -vV
          python -m maturin build --release --target ${{ matrix.target }} --out dist

      - name: Build sdist
        if: matrix.os == 'macos-15' && matrix.target == 'aarch64-apple-darwin'
        run: python -m maturin sdist --out dist

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v5
        with:
          name: dist-${{ matrix.os }}-${{ matrix.target }}
          path: dist

