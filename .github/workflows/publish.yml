          echo "RUSTFLAGS=${SWIFT_RUSTFLAGS# } ${RUSTFLAGS:-}" >> "$GITHUB_ENV"

      - name: Add Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Pre-build Swift runtime debug
        shell: bash
        run: |
          mkdir -p out/ci-debug
          bash scripts/debug_swift_runtime.sh | tee out/ci-debug/swift-runtime-prebuild.txt

      - name: Build x86_64 wheel (debug)
        id: build_x86
        continue-on-error: true
        shell: bash
        run: |
          export PATH="$(dirname "$(rustup which cargo)"):$PATH"
          hash -r
          mkdir -p out/ci-debug dist
          {
            echo "SWIFT_STDLIB_DIR=$SWIFT_STDLIB_DIR"
            echo "DYLD_FALLBACK_LIBRARY_PATH=$DYLD_FALLBACK_LIBRARY_PATH"
            echo "RUSTFLAGS=$RUSTFLAGS"
            which python
            python --version
            which cargo
            cargo -vV
            which rustc
            rustc -vV
            python -m maturin build --release --target ${{ matrix.target }} --out dist
          } 2>&1 | tee out/ci-debug/build-x86_64.log

      - name: Post-build Swift runtime debug
        if: ${{ always() }}
        shell: bash
        run: |
          mkdir -p out/ci-debug
          WHEEL=$(find dist -name '*.whl' | head -n 1 || true)
          if [ -n "$WHEEL" ]; then
            bash scripts/debug_swift_runtime.sh "$WHEEL" | tee out/ci-debug/swift-runtime-postbuild.txt
          else
            bash scripts/debug_swift_runtime.sh | tee out/ci-debug/swift-runtime-postbuild.txt
          fi
          find target \( -path '*/x86_64-apple-darwin/*' \) \( -name 'lib_macloop.dylib' -o -name '_macloop*.so' \) | sort > out/ci-debug/x86-target-binaries.txt || true
          cat out/ci-debug/x86-target-binaries.txt || true

      - name: Upload x86_64 debug artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v5
        with:
          name: x86_64-debug-${{ matrix.os }}
          path: |
            out/ci-debug
            dist

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/macloop/
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          packages-dir: dist/
          skip-existing: true
          verbose: true

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/macloop/
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          path: dist
          pattern: dist-*
          merge-multiple: true

      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
          skip-existing: true
          verbose: true
