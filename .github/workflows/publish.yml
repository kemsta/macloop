name: Build And Publish

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - "**"
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Run pytest
    runs-on: macos-15
    env:
      UV_CACHE_DIR: .uv-cache
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up uv
        uses: astral-sh/setup-uv@v4

      - name: Install native build deps
        run: |
          brew update
          brew install meson ninja pkg-config

      - name: Resolve Swift stdlib path
        shell: bash
        run: |
          SWIFT_TARGET_INFO="$(swiftc -print-target-info)"
          echo "$SWIFT_TARGET_INFO"

          mapfile -t SWIFT_RUNTIME_LIBRARY_PATHS < <(
            python -c 'import json, sys; data = json.load(sys.stdin); [print(path) for path in data["paths"].get("runtimeLibraryPaths", []) if path]' <<<"$SWIFT_TARGET_INFO"
          )
          SWIFT_RUNTIME_RESOURCE_DIR="$(
            python -c 'import json, sys; print(json.load(sys.stdin)["paths"].get("runtimeResourcePath", ""))' <<<"$SWIFT_TARGET_INFO"
          )"

          SEARCH_PATHS=("${SWIFT_RUNTIME_LIBRARY_PATHS[@]}")
          [ -n "$SWIFT_RUNTIME_RESOURCE_DIR" ] && SEARCH_PATHS+=("$SWIFT_RUNTIME_RESOURCE_DIR")
          if [ -n "$SWIFT_RUNTIME_RESOURCE_DIR" ]; then
            while IFS= read -r candidate; do
              [ -n "$candidate" ] || continue
              SEARCH_PATHS+=("$candidate")
            done < <(
              python - "$SWIFT_RUNTIME_RESOURCE_DIR" <<'PY'
import pathlib, re, sys
resource = pathlib.Path(sys.argv[1])
parent = resource.parent
candidates = []
if parent.exists():
    for child in parent.glob("swift*/macosx"):
        if (child / "libswiftCore.dylib").exists():
            candidates.append(child)

def version_key(path: pathlib.Path):
    match = re.search(r"swift-(.+?)(?:/|$)", str(path))
    if not match:
        return ()
    parts = []
    for piece in re.split(r"[.-]", match.group(1)):
        try:
            parts.append((0, int(piece)))
        except ValueError:
            parts.append((1, piece))
    return tuple(parts)

for child in sorted(candidates, key=version_key, reverse=True):
    print(child)
PY
            )
          fi

          UNIQUE_PATHS=()
          for candidate in "${SEARCH_PATHS[@]}"; do
            [ -n "$candidate" ] || continue
            already_present=""
            for existing in "${UNIQUE_PATHS[@]}"; do
              if [ "$existing" = "$candidate" ]; then
                already_present=1
                break
              fi
            done
            [ -n "$already_present" ] || UNIQUE_PATHS+=("$candidate")
          done
          SEARCH_PATHS=("${UNIQUE_PATHS[@]}")

          SWIFT_STDLIB_DIR=""
          for candidate in "${SEARCH_PATHS[@]}"; do
            if [ -f "$candidate/libswiftCore.dylib" ]; then
              SWIFT_STDLIB_DIR="$candidate"
              break
            fi
          done
          if [ -z "$SWIFT_STDLIB_DIR" ]; then
            echo "swiftc target info did not yield a directory containing libswiftCore.dylib" >&2
            printf 'candidate: %s\n' "${SEARCH_PATHS[@]}" >&2
            exit 1
          fi

          DYLD_SWIFT_PATHS="$(IFS=:; echo "${SEARCH_PATHS[*]}")"
          SWIFT_RUSTFLAGS=""
          for candidate in "${SEARCH_PATHS[@]}"; do
            SWIFT_RUSTFLAGS="$SWIFT_RUSTFLAGS -C link-arg=-L$candidate -C link-arg=-Wl,-rpath,$candidate"
          done

          echo "Resolved SWIFT_STDLIB_DIR=$SWIFT_STDLIB_DIR"
          echo "Resolved SWIFT_RUNTIME_RESOURCE_DIR=$SWIFT_RUNTIME_RESOURCE_DIR"
          printf 'Resolved Swift runtime search paths:\n'
          printf '  %s\n' "${SEARCH_PATHS[@]}"
          echo "SWIFT_STDLIB_DIR=$SWIFT_STDLIB_DIR" >> "$GITHUB_ENV"
          echo "SWIFT_RUNTIME_RESOURCE_DIR=$SWIFT_RUNTIME_RESOURCE_DIR" >> "$GITHUB_ENV"
          echo "DYLD_FALLBACK_LIBRARY_PATH=$DYLD_SWIFT_PATHS${DYLD_FALLBACK_LIBRARY_PATH:+:$DYLD_FALLBACK_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "RUSTFLAGS=${SWIFT_RUSTFLAGS# } ${RUSTFLAGS:-}" >> "$GITHUB_ENV"

      - name: Run tests
        run: |
          uv sync --group dev --no-install-project --no-install-workspace --no-install-package macloop --no-install-local
          .venv/bin/maturin develop --manifest-path python_ffi/Cargo.toml
          .venv/bin/pytest -q tests

      - name: Install Rust coverage tooling
        if: ${{ github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/') }}
        run: |
          rustup component add llvm-tools-preview
          cargo install cargo-llvm-cov --locked

      - name: Generate Python coverage report
        if: ${{ github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/') }}
        run: |
          uv sync --group dev --no-install-project --no-install-workspace --no-install-package macloop --no-install-local
          .venv/bin/maturin develop --manifest-path python_ffi/Cargo.toml
          .venv/bin/pytest \
            --cov=macloop \
            --cov-report=xml:python-coverage.xml \
            --cov-report=term-missing \
            -q tests/test_public_api.py tests/test_runtime_helpers.py tests/test_e2e_synthetic.py

      - name: Generate Rust coverage report (lcov)
        if: ${{ github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/') }}
        shell: bash
        run: |
          SWIFT_RUSTFLAGS="$RUSTFLAGS"
          cargo llvm-cov clean --workspace
          source <(cargo llvm-cov show-env --export-prefix)
          export CARGO_TARGET_DIR="${CARGO_LLVM_COV_TARGET_DIR:-target/llvm-cov-target}"
          export RUSTFLAGS="$RUSTFLAGS $SWIFT_RUSTFLAGS"
          cargo llvm-cov --workspace --no-report
          .venv/bin/maturin develop --manifest-path python_ffi/Cargo.toml
          .venv/bin/pytest -q tests/test_e2e_synthetic.py tests/test_ffi_backend.py
          cargo llvm-cov report --lcov --output-path rust-lcov.info

      - name: Upload coverage to Codecov
        if: ${{ github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/') }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: rust-lcov.info
          flags: rust
          disable_search: true
          fail_ci_if_error: false

      - name: Upload Python coverage to Codecov
        if: ${{ github.event_name == 'pull_request' || startsWith(github.ref, 'refs/heads/') }}
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: python-coverage.xml
          flags: python
          disable_search: true
          fail_ci_if_error: false

  build:
    name: Build wheels and sdist
    needs: test
    runs-on: ${{ matrix.os }}
    env:
      MACOSX_DEPLOYMENT_TARGET: "11.0"
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-15
            python-version: "3.11"
            target: aarch64-apple-darwin
          - os: macos-15-intel
            python-version: "3.11"
            target: x86_64-apple-darwin

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install maturin
        run: python -m pip install 'maturin>=1.0,<2.0'

      - name: Patch Cargo.toml version from tag
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          VERSION="${TAG#v}"
          if [ "$VERSION" = "$TAG" ]; then
            echo "Tag must start with 'v', got: $TAG" >&2
            exit 1
          fi
          sed -i.bak -E "s/^version = \".*\"$/version = \"${VERSION}\"/" python_ffi/Cargo.toml
          rm -f python_ffi/Cargo.toml.bak
          grep -n '^version = ' python_ffi/Cargo.toml

      - name: Install native build deps
        run: |
          brew update
          brew install meson ninja pkg-config

      - name: Resolve Swift stdlib path
        shell: bash
        run: |
          case "${{ matrix.target }}" in
            aarch64-apple-darwin)
              SWIFT_TARGET="arm64-apple-macosx${MACOSX_DEPLOYMENT_TARGET}"
              ;;
            x86_64-apple-darwin)
              SWIFT_TARGET="x86_64-apple-macosx${MACOSX_DEPLOYMENT_TARGET}"
              ;;
            *)
              echo "Unsupported Rust target for Swift runtime resolution: ${{ matrix.target }}" >&2
              exit 1
              ;;
          esac

          SWIFT_TARGET_INFO="$(swiftc -target "$SWIFT_TARGET" -print-target-info)"
          echo "$SWIFT_TARGET_INFO"

          mapfile -t SWIFT_RUNTIME_LIBRARY_PATHS < <(
            python -c 'import json, sys; data = json.load(sys.stdin); [print(path) for path in data["paths"].get("runtimeLibraryPaths", []) if path]' <<<"$SWIFT_TARGET_INFO"
          )
          SWIFT_RUNTIME_RESOURCE_DIR="$(
            python -c 'import json, sys; print(json.load(sys.stdin)["paths"].get("runtimeResourcePath", ""))' <<<"$SWIFT_TARGET_INFO"
          )"

          SEARCH_PATHS=("${SWIFT_RUNTIME_LIBRARY_PATHS[@]}")
          [ -n "$SWIFT_RUNTIME_RESOURCE_DIR" ] && SEARCH_PATHS+=("$SWIFT_RUNTIME_RESOURCE_DIR")
          if [ -n "$SWIFT_RUNTIME_RESOURCE_DIR" ]; then
            while IFS= read -r candidate; do
              [ -n "$candidate" ] || continue
              SEARCH_PATHS+=("$candidate")
            done < <(
              python - "$SWIFT_RUNTIME_RESOURCE_DIR" <<'PY'
import pathlib, re, sys
resource = pathlib.Path(sys.argv[1])
parent = resource.parent
candidates = []
if parent.exists():
    for child in parent.glob("swift*/macosx"):
        if (child / "libswiftCore.dylib").exists():
            candidates.append(child)

def version_key(path: pathlib.Path):
    match = re.search(r"swift-(.+?)(?:/|$)", str(path))
    if not match:
        return ()
    parts = []
    for piece in re.split(r"[.-]", match.group(1)):
        try:
            parts.append((0, int(piece)))
        except ValueError:
            parts.append((1, piece))
    return tuple(parts)

for child in sorted(candidates, key=version_key, reverse=True):
    print(child)
